<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlyHigh | Contact</title>

    <link rel="stylesheet" href="travel_recommendation.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <nav>

        <div class="logo">FlyHigh</div>

        <ul class="nav-links">
            <li><a href="travel_recommendation.html">Home</a></li>
            <li><a href="travel_recommendation_about.html">About</a></li>
            <li><a href="travel_recommendation_contact.html">Contact</a></li>
        </ul>

    </nav>
</header>

<main class="contact">

    <aside class="social-links">

        <a href="#">
            <i class="fa-brands fa-x-twitter"></i>
        </a>

        <a href="#">
            <i class="fa-brands fa-facebook-f"></i>
        </a>

        <a href="#">
            <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="#">
            <i class="fa-brands fa-youtube"></i>
        </a>

    </aside>

    <section class="contact-content">

        <div class="contact-text">

            <h1>CONTACT US</h1>

            <p>Get in touch</p>

        </div>

        <div class="contact-form">

            <form id="contact-form">

                <div class="form-group">
                    <label for="name-input">Name</label>

                    <input
                        type="text"
                        id="name-input"
                        placeholder="Enter your name"
                        required>
                </div>

                <div class="form-group">
                    <label for="email-input">Email</label>

                    <input
                        type="email"
                        id="email-input"
                        placeholder="Enter your email"
                        required>
                </div>

                <div class="form-group">
                    <label for="msg-input">Message</label>

                    <textarea
                        id="msg-input"
                        rows="6"
                        placeholder="Enter your message"
                        required></textarea>
                </div>

                <button type="submit">Submit</button>

            </form>

        </div>

    </section>

</main>

<script src="travel_recommendation.js"></script>

</body>
</html>
